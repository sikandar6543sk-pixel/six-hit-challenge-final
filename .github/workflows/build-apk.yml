name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Fix v1 to v2 and Add Earning
        run: |
          echo "" | base64 --decode > /tmp/fix.py
          python3 /tmp/fix.py

      - name: Build APK
        run: |
          PUBSPEC=$(find . -name "pubspec.yaml" | head -n 1)
          DIR=$(dirname "$PUBSPEC")
          echo "Building in $DIR"
          cd "$DIR"
          flutter pub get
          flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: APK-EARNING-FINAL
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            **/build/app/outputs/flutter-apk/app-release.apk
