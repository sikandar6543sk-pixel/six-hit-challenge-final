name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Fix Android v1 to v2
        run: |
          rm -rf android
          flutter create. --platforms=android

      - name: Add Earning AdMob ID
        run: python3 -c "import base64, pathlib; pathlib.Path('android/app/src/main').mkdir(parents=True, exist_ok=True); data=base64.b64decode(''); open('android/app/src/main/AndroidManifest.xml','wb').write(data)"

      - run: flutter pub get
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: APK-EARNING
          path: build/app/outputs/flutter-apk/app-release.apk
